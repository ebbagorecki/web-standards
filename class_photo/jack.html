<body
  style="
    margin: 0;
    font-size: 12vh;
    box-sizing: border-box;
    background: rgb(255, 170, 225);
    padding: 20px 50px;
    font-family: Gill Sans;
  "
>
  <div
    style="
      width: 100%;
      height: 10vh;
      border-top-left-radius: 100%;
      border-top-right-radius: 100%;
      background: rgb(227, 185, 136);
      display: flex;
      justify-content: end;
      align-items: end;
    "
  >
    <div
      style="
        width: 100%;
        height: 50px;
        background: rgb(204, 165, 121);
        clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      "
    ></div>
  </div>
  <div style="width: 100%; height: 50px; background: rgb(107, 59, 19)"></div>
  <div
    style="
      width: 100%;
      height: 15vh;
      background: rgb(223, 209, 181);
      display: flex;
      justify-content: center;
      align-items: center;
    "
  >
    <p style="transform: rotate(90deg)">:-</p>
  </div>
  <div
    style="
      width: 100%;
      height: 15vh;
      border-bottom-left-radius: 50%;
      border-bottom-right-radius: 50%;
      background: rgb(98, 34, 34);
      display: flex;
      justify-content: center;
      align-items: center;
    "
  >
    <p style="transform: rotate(90deg)">)</p>
  </div>
  <div
    style="
      width: 100%;
      height: 33vh;
      background: rgb(0, 17, 145);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      clip-path: polygon(
        20% 0%,
        80% 0%,
        100% 20%,
        100% 80%,
        80% 100%,
        20% 100%,
        0% 80%,
        0% 20%
      );
  
    "
  ></div>
  <div
    style="
      width: 100%;
      height: 33vh;
      background: rgb(77, 137, 255);
      display: flex;
      justify-content: center;
      align-items: center;
    "
  ></div>
</body>
